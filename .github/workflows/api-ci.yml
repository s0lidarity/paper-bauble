name: API CI

on:
  push:
    branches: ['**']
    paths:
      - 'apps/api/**'
  pull_request:
    paths:
      - 'apps/api/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Install dependencies
        run: go mod download
        working-directory: apps/api

      - name: Run tests
        run: go test -v ./...
        working-directory: apps/api