name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  pull_request:
    paths:
      - 'apps/api/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Run tests
        run: go test -v ./...
        working-directory: apps/api